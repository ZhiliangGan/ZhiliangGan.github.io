name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./public
          user_name: ZhiliangGan
          user_email: ZhiliangGan@users.noreply.github.com
          cname: www.ganyiming.top
        env:
          ACTION_DEPLOY_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}

  sync-gitee:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd public
          git init
          git config --local user.name "ZhiliangGan"
          git config --local user.email "ZhiliangGan@users.noreply.github.com"
          git remote add gitee "https://james19:${GITEE_TOKEN}@gitee.com/james19/james.git"
          git add -A
          git commit -m "Sync from GitHub Pages"
          git branch -M master
          git push -f gitee master
